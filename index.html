<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カウンター</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg0: #080e1c;
  --bg1: #0d1626;
  --bg2: #132240;
  --bg3: #1c3156;
  --border: rgba(255,255,255,.08);
  --border-hi: rgba(255,255,255,.14);
  --text1: #f0f4ff;
  --text2: #8ba4c8;
  --text3: #556989;
  --gold:  #f0a500;
  --gold-lt: #ffc93c;
  --tA:   #38bdf8;
  --tA-dk:#0ea5e9;
  --tB:   #f97316;
  --tB-dk:#ea580c;
  --tH:   #64748b;
  --tH-dk:#475569;
  --green:#34d399;
  --red:  #f87171;
  --fnt: 'Hiragino Kaku Gothic ProN','Hiragino Sans','メイリオ',Meiryo,'Yu Gothic UI',system-ui,sans-serif;
  --radius: 14px;
}

body {
  font-family: var(--fnt);
  background: var(--bg0);
  color: var(--text1);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ─────────────────────────────── */
.hdr {
  background: linear-gradient(170deg, #0b1830 0%, var(--bg1) 100%);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px 12px;
  position: sticky;
  top: 0;
  z-index: 90;
}
.hdr-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.app-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  letter-spacing: .06em;
  text-transform: uppercase;
  line-height: 1.5;
}
.grand { text-align: center; }
.grand-num {
  font-size: 54px;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  letter-spacing: -.03em;
  font-variant-numeric: tabular-nums;
  text-shadow: 0 0 40px rgba(240,165,0,.3);
}
.grand-lbl { font-size: 11px; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; }

.day-row { display: flex; gap: 8px; justify-content: center; }
.day-btn {
  background: rgba(255,255,255,.05);
  border: 1.5px solid var(--border);
  color: var(--text2);
  padding: 6px 16px;
  border-radius: 30px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  font-family: var(--fnt);
  transition: all .18s;
}
.day-btn.active  { background: rgba(240,165,0,.15); border-color: var(--gold); color: var(--gold-lt); }
.day-btn:hover:not(.active) { background: rgba(255,255,255,.09); color: var(--text1); }

/* ── MAIN ───────────────────────────────── */
.main { padding: 14px 14px 100px; max-width: 1100px; margin: 0 auto; }
.sec-lbl {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text3);
  margin: 14px 0 8px;
}

/* ── TEAM STRIP ─────────────────────────── */
.teams {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}
.team-tile {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-top: 2.5px solid var(--tA);
  border-radius: var(--radius);
  padding: 11px 13px 10px;
  text-align: center;
}
.team-tile.b  { border-top-color: var(--tB); }
.team-tile.h  { border-top-color: var(--tH); }
.t-name  { font-size: 11px; color: var(--text3); font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
.t-count { font-size: 30px; font-weight: 900; color: var(--tA); line-height: 1.1; font-variant-numeric: tabular-nums; letter-spacing: -.02em; }
.team-tile.b .t-count { color: var(--tB); }
.team-tile.h .t-count { color: var(--tH); }

/* team progress */
.t-prog-wrap { margin: 5px 0 2px; }
.t-prog-track { background: rgba(255,255,255,.07); border-radius: 4px; height: 5px; overflow: hidden; }
.t-prog-fill  { height: 100%; border-radius: 4px; background: var(--tA); transition: width .5s ease; }
.team-tile.b .t-prog-fill { background: var(--tB); }
.t-prog-fill.gold { background: var(--gold); }
.t-prog-info {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text3);
  margin-top: 3px;
  font-variant-numeric: tabular-nums;
}
.t-prog-info .t-goal-pct { font-weight: 800; }

/* ── GRID ───────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
@media (max-width: 700px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
  .grand-num { font-size: 42px; }
}

/* ── PERSON CARD ────────────────────────── */
.pcard {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 3.5px solid var(--tA);
  border-radius: var(--radius);
  padding: 13px 12px 11px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  transition: box-shadow .2s;
}
.pcard:hover { box-shadow: 0 4px 20px rgba(0,0,0,.4); }
.pcard.tb    { border-left-color: var(--tB); }
.pcard.th    { border-left-color: var(--tH); }
.pcard.glow-a { box-shadow: 0 0 0 2px rgba(56,189,248,.45), 0 6px 24px rgba(0,0,0,.4); }
.pcard.glow-b { box-shadow: 0 0 0 2px rgba(249,115,22,.45), 0 6px 24px rgba(0,0,0,.4); }

.pcard-head { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
.pcard-emo  { font-size: 20px; line-height: 1.2; }
.pcard-info { flex: 1; min-width: 0; }
.pcard-name { font-size: 17px; font-weight: 800; color: var(--text1); }
.pcard-role { font-size: 10px; color: var(--text3); font-weight: 700; letter-spacing: .05em; text-transform: uppercase; margin-top: 1px; }

.pcard-total { text-align: center; margin: 2px 0 0; }
.pcard-cnt {
  font-size: 50px;
  font-weight: 900;
  color: var(--text1);
  line-height: 1;
  letter-spacing: -.03em;
  font-variant-numeric: tabular-nums;
  display: inline-block;
}
.pcard-cnt.bump { animation: cntBump .5s cubic-bezier(.22,1.5,.36,1); }
@keyframes cntBump {
  0%  { transform: scale(1);    color: var(--text1); }
  35% { transform: scale(1.45); color: var(--gold-lt); }
  100%{ transform: scale(1);    color: var(--text1); }
}
.pcard-unit { font-size: 13px; color: var(--text3); font-weight: 700; }

/* personal progress bar */
.p-prog-wrap { margin: 5px 0 4px; }
.p-prog-track { background: rgba(255,255,255,.07); border-radius: 4px; height: 4px; overflow: hidden; }
.p-prog-fill  { height: 100%; border-radius: 4px; background: var(--tA); transition: width .5s ease; }
.pcard.tb .p-prog-fill { background: var(--tB); }
.p-prog-fill.gold { background: var(--gold); }
.p-prog-info {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text3);
  margin-top: 3px;
  font-variant-numeric: tabular-nums;
}

/* day row */
.drow {
  display: flex;
  justify-content: space-between;
  background: rgba(0,0,0,.2);
  border-radius: 8px;
  padding: 5px 2px;
  margin: 5px 0 9px;
}
.dcell { flex: 1; text-align: center; }
.dlbl  { font-size: 10px; color: var(--text3); letter-spacing: .04em; font-weight: 700; }
.dval  { font-size: 15px; font-weight: 800; color: var(--text2); font-variant-numeric: tabular-nums; }
.dcell.now .dlbl { color: var(--tA); }
.dcell.now .dval { color: var(--text1); }
.pcard.tb .dcell.now .dlbl { color: var(--tB); }
.pcard.tb .dcell.now .dval { color: var(--text1); }

/* add button */
.add-btn {
  margin-top: auto;
  width: 100%;
  background: linear-gradient(135deg, var(--tA-dk), var(--tA));
  color: #fff;
  border: none;
  border-radius: 9px;
  padding: 13px 0;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  font-family: var(--fnt);
  letter-spacing: .02em;
  transition: all .15s;
  touch-action: manipulation;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.pcard.tb .add-btn { background: linear-gradient(135deg, var(--tB-dk), var(--tB)); }
.pcard.th .add-btn { background: linear-gradient(135deg, var(--tH-dk), var(--tH)); }
.add-btn:hover  { filter: brightness(1.12); transform: scale(1.015); }
.add-btn:active { transform: scale(.96); }

/* ── TOAST ──────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(90px);
  background: var(--bg3);
  border: 1px solid var(--border-hi);
  color: var(--text1);
  padding: 13px 22px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  max-width: 92vw;
  width: 340px;
  text-align: center;
  transition: transform .35s cubic-bezier(.34,1.56,.64,1);
  z-index: 500;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── FAB ────────────────────────────────── */
.fab {
  position: fixed;
  bottom: 24px; right: 18px;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--bg2);
  border: 1.5px solid var(--border-hi);
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  transition: transform .2s;
  color: var(--text2);
}
.fab:hover { transform: rotate(22deg); }

/* ── SETTINGS ───────────────────────────── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.72);
  z-index: 200;
  align-items: center; justify-content: center;
  padding: 20px;
  backdrop-filter: blur(6px);
}
.overlay.open { display: flex; }
.sbox {
  background: var(--bg2);
  border: 1px solid var(--border-hi);
  border-radius: 18px;
  padding: 24px;
  width: 100%; max-width: 420px;
  box-shadow: 0 24px 64px rgba(0,0,0,.6);
}
.stitle { font-size: 17px; font-weight: 800; color: var(--text1); margin-bottom: 18px; }
.field { margin-bottom: 15px; }
.field label { display: block; font-size: 11px; font-weight: 800; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
.field input {
  width: 100%;
  background: var(--bg1); border: 1.5px solid var(--border-hi);
  border-radius: 8px; padding: 10px 12px;
  font-size: 13px; font-family: var(--fnt); color: var(--text1); outline: none;
  transition: border-color .2s;
}
.field input::placeholder { color: var(--text3); }
.field input:focus { border-color: var(--tA); }
.fhint { font-size: 11px; color: var(--text3); margin-top: 5px; }
.fhint.ok { color: var(--green); }
.btn-row { display: flex; gap: 8px; justify-content: flex-end; }
.btn { padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 700; font-family: var(--fnt); cursor: pointer; border: none; transition: all .15s; }
.btn-ghost   { background: none; border: 1.5px solid var(--border-hi); color: var(--text2); }
.btn-ghost:hover { background: rgba(255,255,255,.06); color: var(--text1); }
.btn-primary { background: var(--tA); color: #fff; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-test    { background: var(--bg1); color: var(--text2); border: 1.5px solid var(--border-hi); }
.btn-test:hover { background: var(--bg3); color: var(--text1); }
.danger-zone { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }
.dlbl2 { font-size: 11px; color: var(--red); font-weight: 800; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .08em; }
.btn-danger { background: rgba(248,113,113,.1); color: var(--red); border: 1.5px solid rgba(248,113,113,.25); }
.btn-danger:hover { background: rgba(248,113,113,.18); }
  </style>
</head>
<body>

<header class="hdr">
  <div class="hdr-top">
    <div class="app-title">ものづくりワールド2026<br>アポ獲得カウンター</div>
    <div class="grand">
      <div class="grand-num" id="grandTotal">0</div>
      <div class="grand-lbl">総アポ獲得数</div>
    </div>
  </div>
  <div class="day-row">
    <button class="day-btn" id="tab1" onclick="setDay(1)">Day 1 / 7月2日</button>
    <button class="day-btn" id="tab2" onclick="setDay(2)">Day 2 / 7月3日</button>
    <button class="day-btn" id="tab3" onclick="setDay(3)">Day 3 / 7月4日</button>
  </div>
</header>

<main class="main">
  <div class="sec-lbl">チーム別集計</div>
  <div class="teams">
    <div class="team-tile" id="tile-hayase">
      <div class="t-name">チーム早瀬</div>
      <div class="t-count" id="tA">0</div>
      <div class="t-prog-wrap">
        <div class="t-prog-track"><div class="t-prog-fill" id="tA-bar" style="width:0%"></div></div>
        <div class="t-prog-info"><span id="tA-sub">0/144本</span><span class="t-goal-pct" id="tA-pct">0%</span></div>
      </div>
    </div>
    <div class="team-tile b" id="tile-yoshie">
      <div class="t-name">チーム吉江</div>
      <div class="t-count" id="tB">0</div>
      <div class="t-prog-wrap">
        <div class="t-prog-track"><div class="t-prog-fill" id="tB-bar" style="width:0%"></div></div>
        <div class="t-prog-info"><span id="tB-sub">0/130本</span><span class="t-goal-pct" id="tB-pct">0%</span></div>
      </div>
    </div>
    <div class="team-tile h">
      <div class="t-name">派遣チーム</div>
      <div class="t-count" id="tH">0</div>
    </div>
  </div>

  <div class="sec-lbl">個人別カウント</div>
  <div class="grid" id="grid"></div>
</main>

<button class="fab" onclick="openSettings()" title="設定">⚙️</button>

<div class="overlay" id="overlay" onclick="bgClick(event)">
  <div class="sbox">
    <div class="stitle">⚙️ 設定</div>
    <div class="field">
      <label>Slack Webhook URL</label>
      <input type="url" id="slackInput" placeholder="https://hooks.slack.com/services/..." />
      <div class="fhint" id="slackHint">URLを入力して保存してください</div>
    </div>
    <div class="btn-row" style="margin-bottom:10px">
      <button class="btn btn-test" onclick="testSlack()">🔔 テスト</button>
      <button class="btn btn-ghost" onclick="closeSettings()">閉じる</button>
      <button class="btn btn-primary" onclick="saveSettings()">保存</button>
    </div>
    <div class="danger-zone">
      <div class="dlbl2">⚠ データリセット</div>
      <button class="btn btn-danger" onclick="resetAll()">全データをリセット</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PEOPLE CONFIG
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const PEOPLE = [
  { id:'yoshie',    name:'吉江',  role:'CEO',              emoji:'👑', team:'yoshie', tc:'B', slack:true  },
  { id:'nakajima',  name:'中島',  role:'COO',              emoji:'🧭', team:'hayase', tc:'A', slack:true  },
  { id:'hayase',    name:'早瀬',  role:'営業役員',          emoji:'⚡', team:'hayase', tc:'A', slack:true  },
  { id:'takahashi', name:'高橋',  role:'製造業エキスパート', emoji:'🏭', team:'yoshie', tc:'B', slack:true  },
  { id:'tsuchiya',  name:'土屋',  role:'ITスペシャリスト',   emoji:'💻', team:'hayase', tc:'A', slack:true  },
  { id:'tono',      name:'戸野',  role:'エンジニア',         emoji:'🔧', team:'yoshie', tc:'B', slack:true  },
  { id:'katayama',  name:'片山',  role:'コンサルタント',     emoji:'💼', team:'yoshie', tc:'B', slack:true  },
  { id:'iwasaki',   name:'岩崎',  role:'セールス',           emoji:'🔥', team:'hayase', tc:'A', slack:true  },
  { id:'haken',     name:'派遣',  role:'派遣営業チーム',     emoji:'👥', team:'haken',  tc:'H', slack:false },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// GOALS & TEAMS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const GOALS = {
  yoshie:    36,
  nakajima:  36,
  hayase:    36,
  takahashi: 30,
  tsuchiya:  36,
  tono:      30,
  katayama:  25,
  iwasaki:   36,
};

const TEAMS = {
  hayase: { name:'チーム早瀬', goal:144, members:['hayase','nakajima','tsuchiya','iwasaki'] },
  yoshie: { name:'チーム吉江', goal:130, members:['yoshie','takahashi','tono','katayama'] },
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PRAISE MESSAGES (15 per person, no repeat)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MESSAGE SYSTEM — TRAITS × CLOSERS × SITUATION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const TRAITS = {
  yoshie:    ['場を一瞬で変える力', '人の心を掴む天才的センス', '営業の鬼の本気'],
  nakajima:  ['未来を見通すクレバーな洞察', '落ち着いた知性と安定感', '全体を俯瞰する視点'],
  hayase:    ['ポジティブな前向きエネルギー', '明るさと高い能力の組み合わせ', 'チームを鼓舞するオーラ'],
  takahashi: ['製造業を知り尽くした深い知見', '信頼される成熟した存在感', '業界への本質的な理解'],
  tsuchiya:  ['IT最前線を走る専門知識', '新技術への飽くなき探求心', '専門家としての確かな信頼性'],
  tono:      ['人懐っこく誰からも好かれる魅力', '最新技術へのアンテナの高さ', '技術と人間性の絶妙な融合'],
  katayama:  ['誠実さと成熟感のギャップが生む信頼', 'コンサルタントとしての深い洞察力', '若さと深みを持ち合わせた稀有さ'],
  iwasaki:   ['燃えるような熱いパッション', '強いキャラクターと存在感', '面倒見のいい兄貴分のエネルギー'],
};

const CLOSERS = [
  '今日も炸裂！',
  'さすがの1本！',
  'お客様の心を動かしましたね！',
  '結果が物語っています！',
  'その力が今日も光りました！',
  '見事な1本です！',
  'この調子でどんどん行きましょう！',
  'またアポをもぎ取りました！',
  'お客様が引き込まれるはずですね！',
  '止まらないですね！',
];

const DAILY_GOALS = {
  yoshie:15, nakajima:12, hayase:12, takahashi:10, tsuchiya:12, tono:10, katayama:8, iwasaki:12,
};

function getSituationCtx(id, prevTotal, newTotal, prevDay, newDay) {
  const dg = DAILY_GOALS[id];
  if (dg) {
    for (const [ratio, msg] of [
      [1.0, '本日の目標を完全達成！！'],
      [0.75, '今日の目標まであと一息！その集中力は半端じゃない！'],
      [0.5, '今日の目標の折り返し達成！コミットメントが凄い！'],
    ]) {
      if (prevDay < dg * ratio && newDay >= dg * ratio) return msg;
    }
  }
  if (newTotal === 5)  return 'コツをつかんできた5本目！';
  if (newTotal === 10) return 'もう10本！ベテランの風格が出てきましたね！';
  if (newTotal === 15) return '15本目！止まらない快進撃！';
  if (newTotal === 20) return '20本！まさに怒涛の勢いです！';
  if (newTotal > 20 && newTotal % 5 === 0) return `${newTotal}本目の節目達成！`;
  return null;
}

function buildPraiseMsg(id, prevTotal, newTotal, prevDay, newDay, s) {
  const traits = TRAITS[id];
  if (!traits) return null;
  const u = s.u[id] || { t:[], c:[] };

  let avT = traits.map((_,i)=>i).filter(i=>!u.t.includes(i));
  if (!avT.length) { u.t=[]; avT=traits.map((_,i)=>i); }
  const ti = avT[Math.floor(Math.random()*avT.length)];
  u.t.push(ti);

  let avC = CLOSERS.map((_,i)=>i).filter(i=>!u.c.includes(i));
  if (!avC.length) { u.c=[]; avC=CLOSERS.map((_,i)=>i); }
  const ci = avC[Math.floor(Math.random()*avC.length)];
  u.c.push(ci);

  s.u[id] = u;

  const sit = getSituationCtx(id, prevTotal, newTotal, prevDay, newDay);
  return (sit ? sit + ' ' : '') + traits[ti] + '、' + CLOSERS[ci];
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MILESTONE MESSAGES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const FIRST_MSG = {

  tsuchiya:  `🌟 *土屋さん、展示会初アポ獲得！* IT専門家の信頼力が早速結果に直結しました！`,
  tono:      `🌟 *戸野さん、展示会初アポ獲得！* 人懐っこいキャラと技術力で最高のスタートです！`,

function getIndividualMilestoneMsg(id, pct, count, goal) {
  const name = PEOPLE.find(p=>p.id===id)?.name;
  if (pct===25)  return `📈 *${name}さん、個人目標25%到達！*（${count}/${goal}本）着実に積み上げています！このペースが最高です！`;
  if (pct===50)  return `🎯 *${name}さん、個人目標の折り返し！*（${count}/${goal}本）後半もこの調子で一気に行こう！`;
  if (pct===75)  return `🚀 *${name}さん、目標まであと25%！*（${count}/${goal}本）ゴールが目前です！ラストスパートだ！`;
  if (pct===100) return `🏆 *${name}さん、個人目標${goal}本を完全達成！！！* このパフォーマンスは圧巻です！おめでとうございます！！`;
  return null;
}

const TEAM_MILESTONE_MSG = {
  hayase: {
    25:  (c,g) => `📈 *チーム早瀬が目標25%到達！*（${c}/${g}本）絶好調のスタートです！このペースで絶対にゴールへ！`,
    50:  (c,g) => `🎯 *チーム早瀬が折り返し点通過！*（${c}/${g}本）後半もこの勢いで一気に仕上げましょう！`,

    100: (c,g) => `🏆🎉 *チーム早瀬、目標${g}本を全達成！！！*\n展示会の歴史に刻まれる圧巻の結果です！チーム全員に最大の拍手を！！！`,
  },
  yoshie: {
    25:  (c,g) => `📈 *チーム吉江が目標25%到達！*（${c}/${g}本）吉江さんのリーダーシップのもと着実に前進中！`,
    50:  (c,g) => `🎯 *チーム吉江が折り返し点通過！*（${c}/${g}本）チーム一丸でここまで来た！後半も行くぞ！`,
    75:  (c,g) => `🚀 *チーム吉江、残り25%！*（${c}/${g}本）チームの底力が炸裂しています！あと一息！`,
    100: (c,g) => `🏆🎉 *チーム吉江、目標${g}本を全達成！！！*\n圧倒的なチームワークで偉業を達成！全員が誇れる結果です！！！`,
  },

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const KEY = 'inproc-apo-v1';

function blank() {
  const c={}, d={1:{},2:{},3:{}}, u={};
  PEOPLE.forEach(p => { c[p.id]=0; d[1][p.id]=0; d[2][p.id]=0; d[3][p.id]=0; u[p.id]={t:[],c:[]}; });
  return { c, d, u, webhook:'', day:1, fired:{} };
}

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (!raw) return blank();
    const s = JSON.parse(raw), b = blank();
    return {
      ...b, ...s,
      c: {...b.c, ...s.c},
      d: { 1:{...b.d[1],...(s.d||{})[1]}, 2:{...b.d[2],...(s.d||{})[2]}, 3:{...b.d[3],...(s.d||{})[3]} },
      u: (() => { const u={}; PEOPLE.forEach(p => { const o=s.u?.[p.id]; u[p.id]=(!o||Array.isArray(o))?{t:[],c:[]}:{t:o.t||[],c:o.c||[]}; }); return u; })(),
      fired: {...(s.fired||{})},
    };
  } catch(e) { return blank(); }
}

function save(s) { localStorage.setItem(KEY, JSON.stringify(s)); }


// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MILESTONE DETECTION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function detectMilestones(id, prev, next, s) {
  const results = [];
  const goal = GOALS[id];

  if (goal) {
    // First apo
    if (prev === 0 && next === 1) {
      const k = `${id}_first`;
      if (!s.fired[k]) { s.fired[k]=true; results.push({ type:'first', id }); }
    }
    // Percentage thresholds
    for (const pct of [25,50,75,100]) {
      const ratio = pct/100;
      if (prev/goal < ratio && next/goal >= ratio) {
        const k = `${id}_${pct}`;
        if (!s.fired[k]) { s.fired[k]=true; results.push({ type:'indiv', id, pct, count:next, goal }); }
      }
    }
  }

  // Team milestone
  const teamId = PEOPLE.find(p=>p.id===id)?.team;
  if (teamId && TEAMS[teamId]) {
    const t = TEAMS[teamId];
    const prevTeam = t.members.reduce((a,mid)=>a+(mid===id?prev:s.c[mid]),0);
    const nextTeam = t.members.reduce((a,mid)=>a+s.c[mid],0);
    for (const pct of [25,50,75,100]) {
      const ratio = pct/100;
      if (prevTeam/t.goal < ratio && nextTeam/t.goal >= ratio) {
        const k = `team_${teamId}_${pct}`;
        if (!s.fired[k]) { s.fired[k]=true; results.push({ type:'team', teamId, pct, count:nextTeam, goal:t.goal }); }
      }
    }
  }

  return results;
}

function buildMilestoneSlackMsg(m) {
  if (m.type === 'first')  return FIRST_MSG[m.id] || null;
  if (m.type === 'indiv')  return getIndividualMilestoneMsg(m.id, m.pct, m.count, m.goal);
  if (m.type === 'team') {
    const fn = TEAM_MILESTONE_MSG[m.teamId]?.[m.pct];
    return fn ? fn(m.count, m.goal) : null;
  }
  return null;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SLACK
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function pushSlack(url, text) {
  if (!url) return false;
  try {
    await fetch(url, {
      method:'POST', mode:'no-cors',
      body: new URLSearchParams({ payload: JSON.stringify({ text }) }),
    });
    return true;
  } catch(e) { console.warn('Slack:', e.message); return false; }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INCREMENT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const cd = {};

async function increment(id) {
  if (cd[id]) return;
  cd[id]=true; setTimeout(()=>delete cd[id], 700);

  const s = load();
  const prevTotal = s.c[id];
  const prevDay = s.d[s.day][id];
  s.c[id]++;
  s.d[s.day][id]++;
  const newTotal = s.c[id];
  const newDay = s.d[s.day][id];

  const person = PEOPLE.find(p=>p.id===id);

  let praiseMsg = null;
  if (person.slack && TRAITS[id]) praiseMsg = buildPraiseMsg(id, prevTotal, newTotal, prevDay, newDay, s);

  const milestones = detectMilestones(id, prevTotal, newTotal, s);

  save(s);
  render();
  bump(id, person.tc);

  // Send Slack messages
  if (s.webhook && person.slack && praiseMsg) {
    const mainText = `🎉 *${person.name}さん アポ獲得！*（通算 ${newTotal} 本）\n${praiseMsg}`;
    const ok = await pushSlack(s.webhook, mainText);
    if (ok) toast('📨 Slackに送信しました！');
  }

  if (s.webhook) {
    for (const m of milestones) {
      const msg = buildMilestoneSlackMsg(m);
      if (msg) {
        await new Promise(r=>setTimeout(r,800)); // slight delay between messages
        pushSlack(s.webhook, msg);
      }
    }
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function render() {
  const s = load();

  // Grand total
  let tot=0; PEOPLE.forEach(p=>tot+=s.c[p.id]);
  document.getElementById('grandTotal').textContent = tot;

  // Day tabs
  [1,2,3].forEach(d=>document.getElementById(`tab${d}`).classList.toggle('active',d===s.day));

  // Team totals
  for (const [tid, team] of Object.entries(TEAMS)) {
    const total = team.members.reduce((a,id)=>a+s.c[id],0);
    const pct = Math.min(100, Math.round(total/team.goal*100));
    const isA = tid==='hayase';
    document.getElementById(isA?'tA':'tB').textContent = total;
    document.getElementById(isA?'tA-sub':'tB-sub').textContent = `${total}/${team.goal}本`;
    document.getElementById(isA?'tA-pct':'tB-pct').textContent = `${pct}%`;
    const bar = document.getElementById(isA?'tA-bar':'tB-bar');
    bar.style.width = pct+'%';
    bar.className = 't-prog-fill' + (pct>=100?' gold':'');
  }
  document.getElementById('tH').textContent = s.c['haken']||0;

  // People grid
  document.getElementById('grid').innerHTML = PEOPLE.map(p => {
    const t = s.c[p.id];
    const d1=s.d[1][p.id]||0, d2=s.d[2][p.id]||0, d3=s.d[3][p.id]||0;
    const cur = s.day;
    const tc = p.tc==='B'?'tb': p.tc==='H'?'th':'';
    const goal = GOALS[p.id];
    const progHtml = goal ? (() => {
      const pct = Math.min(100, Math.round(t/goal*100));
      const gold = pct>=100?' gold':'';
      return `
<div class="p-prog-wrap">
  <div class="p-prog-track"><div class="p-prog-fill${gold}" style="width:${pct}%"></div></div>
  <div class="p-prog-info"><span>${t}/${goal}本</span><span>${pct}%</span></div>
</div>`;
    })() : '';

    return `
<div class="pcard ${tc}" id="pc-${p.id}">
  <div class="pcard-head">
    <div class="pcard-emo">${p.emoji}</div>
    <div class="pcard-info">
      <div class="pcard-name">${p.name}</div>
      <div class="pcard-role">${p.role}</div>
    </div>
  </div>
  <div class="pcard-total">
    <span class="pcard-cnt" id="cnt-${p.id}">${t}</span><span class="pcard-unit">本</span>
  </div>
  ${progHtml}
  <div class="drow">
    <div class="dcell${cur===1?' now':''}"><div class="dlbl">DAY1</div><div class="dval">${d1}</div></div>
    <div class="dcell${cur===2?' now':''}"><div class="dlbl">DAY2</div><div class="dval">${d2}</div></div>
    <div class="dcell${cur===3?' now':''}"><div class="dlbl">DAY3</div><div class="dval">${d3}</div></div>
  </div>
  <button class="add-btn" onclick="increment('${p.id}')">＋ アポ獲得！</button>
</div>`;
  }).join('');
}

function bump(id, tc) {
  const el = document.getElementById(`cnt-${id}`);
  if (!el) return;
  el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
  const card = document.getElementById(`pc-${id}`);
  if (card) {
    const gc = tc==='B'?'glow-b':'glow-a';
    card.classList.add(gc); setTimeout(()=>card.classList.remove(gc),800);
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DAY / TOAST
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function setDay(d) { const s=load(); s.day=d; save(s); render(); }

let tmr=null;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  if(tmr) clearTimeout(tmr);
  tmr=setTimeout(()=>el.classList.remove('show'),3200);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SETTINGS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openSettings() {
  const s=load();
  document.getElementById('slackInput').value=s.webhook||'';
  updateHint(s.webhook);
  document.getElementById('overlay').classList.add('open');
}
function closeSettings() { document.getElementById('overlay').classList.remove('open'); }
function bgClick(e) { if(e.target===document.getElementById('overlay')) closeSettings(); }
function updateHint(url) {
  const el=document.getElementById('slackHint');
  if(!url) { el.textContent='URLを入力して保存してください'; el.className='fhint'; }
  else { el.textContent='✓ 設定済み'; el.className='fhint ok'; }
}
function saveSettings() {
  const url=document.getElementById('slackInput').value.trim();
  const s=load(); s.webhook=url; save(s);
  updateHint(url); toast('✅ 設定を保存しました'); closeSettings();
}
async function testSlack() {
  const url=document.getElementById('slackInput').value.trim();
  if(!url) { toast('⚠ Webhook URLを入力してください'); return; }
  toast('📨 テストメッセージを送信中...');
  const ok = await pushSlack(url,'test');
  setTimeout(()=>toast(ok?'✅ テスト送信完了！Slackをご確認ください':'⚠ 送信に失敗しました。URLを確認してください'),800);
}
function resetAll() {
  if(!confirm('すべてのデータをリセットします。本当によろしいですか？')) return;
  localStorage.removeItem(KEY); closeSettings(); render(); toast('🔄 データをリセットしました');
}

render();
</script>
